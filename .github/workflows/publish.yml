name: Publish Packages

on:
  push:
    tags:
      - "nebula-engine@*"
      - "nebula-client@*"
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish"
        required: true
        type: choice
        options:
          - nebula-engine
          - nebula-client
          - both

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  publish-engine:
    needs: test
    if: |
      (startsWith(github.ref, 'refs/tags/nebula-engine@')) ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.package == 'nebula-engine' || github.event.inputs.package == 'both'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter nebula-engine build
      - run: pnpm --filter nebula-engine publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-client:
    needs: test
    if: |
      (startsWith(github.ref, 'refs/tags/nebula-client@')) ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.package == 'nebula-client' || github.event.inputs.package == 'both'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter nebula-client build
      - run: pnpm --filter nebula-client publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
